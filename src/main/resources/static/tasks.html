<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="icon">📝</span> Task Manager</h1>
        </header>
        <form id="taskForm" class="card">
            <div class="form-group">
                <input type="text" id="title" name="title" placeholder="Task Title" required>
            </div>
            <div class="form-group">
                <input type="text" id="description" name="description" placeholder="Description">
            </div>
            <div class="form-group">
                <input type="date" id="dueDate" name="dueDate">
            </div>
            <button type="submit" class="btn-primary">Add Task</button>
        </form>
        <section class="tasks-section card">
            <h2>Your Tasks</h2>
            <ul id="taskList" class="task-list"></ul>
        </section>
    </div>
    <footer>
        <p>Made with <span style="color:#e25555">&#10084;</span> by Task Manager</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
