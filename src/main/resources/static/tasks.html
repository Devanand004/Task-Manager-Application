<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="icon">📝</span> Task Manager</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>
        <form id="taskForm" class="card form-card">
            <h3 id="formTitle">Add New Task</h3>
            <div class="form-group">
                <label for="title">Task Title *</label>
                <input type="text" id="title" name="title" placeholder="Enter task title" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Enter task description (optional)" rows="2"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group half">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" name="dueDate">
                </div>
                <div class="form-group half">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="PENDING">Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Add Task</button>
        </form>
        <section class="tasks-section card">
            <h2>Your Tasks</h2>
            <ul id="taskList" class="task-list"></ul>
        </section>
    </div>
    <footer>
        <p>Made with <span style="color:#e25555">&#10084;</span> by Task Manager</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
